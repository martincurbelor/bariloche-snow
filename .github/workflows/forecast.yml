name: Fetch forecast

on:
  schedule:
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: forecast
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - run: python fetch_forecast.py
        env:
          SF_SESSION_COOKIE: ${{ secrets.SF_SESSION_COOKIE }}

      - name: Update historical (incremental)
        run: python historical/update_current.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/datos.json docs/cameras/ docs/historical.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "update: forecast $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
